image:
  repository: ghcr.io/oufinx/s3lo-operator
  tag: "0.0.1"
  pullPolicy: IfNotPresent

proxy:
  port: 5732

serviceAccount:
  create: true
  name: s3lo-proxy
  annotations: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

nodeSelector: {}
tolerations: []
