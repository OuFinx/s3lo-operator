apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "s3lo-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "s3lo-operator.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "s3lo-operator.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "s3lo-operator.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "s3lo-operator.serviceAccountName" . }}
      hostNetwork: true
      containers:
        - name: s3lo-proxy
          image: {{ include "s3lo-operator.image" . }}
          securityContext:
            runAsUser: 0
          env:
            - name: S3LO_PORT
              value: {{ .Values.proxy.port | quote }}
            - name: S3LO_CERTS_DIR
              value: /host/etc/containerd/certs.d
          ports:
            - containerPort: {{ .Values.proxy.port }}
              hostPort: {{ .Values.proxy.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.proxy.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.proxy.port }}
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: containerd-certs
              mountPath: /host/etc/containerd/certs.d
      volumes:
        - name: containerd-certs
          hostPath:
            path: /etc/containerd/certs.d
            type: DirectoryOrCreate
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
