name: Publish Helm Chart

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  helm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.0"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Get chart version
        id: chart
        run: echo "version=$(grep '^version:' deploy/helm/s3lo-operator/Chart.yaml | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: helm package deploy/helm/s3lo-operator --destination /tmp/helm

      - name: Push chart to GHCR
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push /tmp/helm/s3lo-operator-${{ steps.chart.outputs.version }}.tgz oci://ghcr.io/${owner}
